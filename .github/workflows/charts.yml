name: Charts CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  discover:
    name: Discover charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.discover.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover chart directories
        id: discover
        run: |
          set -euo pipefail
          charts_json=$(find . -mindepth 2 -maxdepth 2 -type f -name Chart.yaml \
              -printf '%h\n' \
            | sed 's#^\./##' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered charts: $charts_json"
          echo "charts=$charts_json" >> "$GITHUB_OUTPUT"

  test:
    name: test (${{ matrix.chart }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.discover.outputs.charts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: helm dependency update
        run: helm dependency update "${{ matrix.chart }}"

      - name: helm lint
        run: helm lint "${{ matrix.chart }}"

      - name: helm template
        run: helm template "${{ matrix.chart }}" "${{ matrix.chart }}"

  changed:
    name: Determine changed charts
    needs: discover
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.changed.outputs.charts }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed chart directories
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DISCOVERED_CHARTS: ${{ needs.discover.outputs.charts }}
        run: |
          set -euo pipefail
          EMPTY_TREE=4b825dc642cb6eb9a060e54bf8d69288fbee4904
          ZERO_SHA=0000000000000000000000000000000000000000

          base="$BEFORE_SHA"
          if [ -z "$base" ] || [ "$base" = "$ZERO_SHA" ]; then
            echo "before-sha is empty/zero (new branch/first push); diffing against empty tree"
            base="$EMPTY_TREE"
          fi

          changed_dirs_json=$(git diff --name-only "$base" "$AFTER_SHA" \
              | awk -F/ '{print $1}' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Changed top-level dirs: $changed_dirs_json"

          result=$(jq -n -c \
              --argjson changed "$changed_dirs_json" \
              --argjson charts "$DISCOVERED_CHARTS" \
              '$charts | map(select(. as $c | $changed | index($c) != null))')

          echo "Changed charts: $result"
          echo "charts=$result" >> "$GITHUB_OUTPUT"

  ship:
    name: ship (${{ matrix.chart }})
    needs: [test, changed]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.changed.outputs.charts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p .ship
          helm package "${{ matrix.chart }}" --destination .ship
          pkg=$(ls .ship/*.tgz)
          echo "package_path=$pkg" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner_lc=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          helm push "${{ steps.package.outputs.package_path }}" "oci://ghcr.io/${owner_lc}/charts"
